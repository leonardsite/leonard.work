<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>F&B Rentals - 2026-03-03</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:#12122a;--text:#e0e0ff;--dim:#667;--border:#1a1a3a}
body{font-family:'SF Pro Display',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.container{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:40px 20px}
header{text-align:center;margin-bottom:40px}
h1{font-size:2.5em;font-weight:800;background:linear-gradient(135deg,#00ff88,#00d4ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;animation:glow 3s ease-in-out infinite alternate}
@keyframes glow{0%{filter:brightness(1)}100%{filter:brightness(1.3)}}
.subtitle{color:var(--dim);margin-top:8px;font-size:1.1em}
.stats{display:flex;justify-content:center;gap:40px;margin-top:24px}
.stat{text-align:center}.stat-num{font-size:2.2em;font-weight:800;background:linear-gradient(135deg,#00ff88,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:.8em;color:var(--dim);margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;margin-top:32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);opacity:0;transform:translateY(40px);animation:fadeUp .6s ease forwards;animation-delay:calc(var(--i) * 0.08s)}
.card:hover{transform:translateY(-6px) scale(1.02);border-color:var(--gc);box-shadow:var(--gg),0 20px 40px #0005}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.grade{font-size:1.6em;font-weight:900;min-width:48px;text-align:center;border:2px solid currentColor;border-radius:12px;padding:2px 8px}.grade .score{font-size:.45em;display:block;opacity:.7;font-weight:400}
.title{font-size:1em;font-weight:600;line-height:1.3;flex:1;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.price{font-size:1.4em;font-weight:800;color:#fff;margin-bottom:4px}.psf{font-size:.85em;color:var(--dim);margin-bottom:10px}
.meta-row{display:flex;gap:12px;font-size:.8em;color:var(--dim);margin-bottom:6px}.meta-row span{background:#1a1a3a;padding:3px 10px;border-radius:20px}
.addr{font-size:.8em;color:var(--dim);margin:8px 0}
.mrt-bar{position:relative;height:22px;background:#1a1a3a;border-radius:11px;overflow:hidden;margin-top:10px}.mrt-fill{height:100%;border-radius:11px}.mrt-label{position:absolute;top:50%;left:10px;transform:translateY(-50%);font-size:.75em;font-weight:600;color:#fff;text-shadow:0 1px 3px #000}
footer{text-align:center;margin-top:48px;padding:24px;color:var(--dim);font-size:.85em}footer a{color:#a855f7;text-decoration:none}
.nav{display:flex;justify-content:center;gap:16px;margin-top:16px}.nav a{padding:8px 20px;border:1px solid var(--border);border-radius:20px;color:var(--text);text-decoration:none;font-size:.9em;transition:all .3s}.nav a:hover,.nav a.active{background:linear-gradient(135deg,#a855f7,#00d4ff);border-color:transparent;color:#fff}
</style></head><body>

<div class="container">

</div>
<script>
const c=document.getElementById('bg'),x=c.getContext('2d');let w,h,pts=[];
function resize(){w=c.width=innerWidth;h=c.height=innerHeight;pts=[];for(let i=0;i<80;i++)pts.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5})}
function draw(){x.clearRect(0,0,w,h);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle='rgba(168,85,247,0.4)';x.fill()});for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<120){x.beginPath();x.moveTo(pts[i].x,pts[i].y);x.lineTo(pts[j].x,pts[j].y);x.strokeStyle='rgba(168,85,247,'+(1-d/120)*.15+')';x.stroke()}}requestAnimationFrame(draw)}
resize();draw();addEventListener('resize',resize);
document.querySelectorAll('.stat-num').forEach(el=>{const t=parseInt(el.textContent);let c=0;const s=()=>{c+=Math.ceil((t-c)/10);el.textContent=c;if(c<t)requestAnimationFrame(s)};setTimeout(s,300)});
</script></body></html>
